name: Build and Release

on:
  push:

    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Dependencies
        run: go mod tidy

      - name: Build Linux Binary
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/osint cmd/osint/main.go

      - name: Build Windows Binary
        run: |
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/osint.exe cmd/osint/main.go

      - name: Generate Automatic Release Tag
        id: tag
        run: |
          # If triggered by a tag, use it. Otherwise, use a short commit SHA + date
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=dev-$(date +'%Y%m%d')-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.VERSION }}
          name: Release ${{ steps.tag.outputs.VERSION }}
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          files: |
            dist/osint
            dist/osint.exe
